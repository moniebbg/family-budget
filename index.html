<input type="file" id="aiFile" accept="image/*" style="display:none" onchange="processAI(this)">
<script>
    const API = 'https://script.google.com/macros/s/AKfycbzpQfUGxBORbKtoUZMcsfvKga84XYYjqg1ZWB30dWaVbqHALM2RtZEq0yEzCL88T-7w2A/exec';
    
    let state = { 
        members: ['Peter', 'Alice', 'Bryan', 'Monie'], 
        expenses: [], 
        cards: [] 
    };
    let activeMember = 'Peter';
    let activeMonth = new Date().toISOString().slice(0, 7);

    const FIXED_ITEMS = [
        { desc: 'Rent', amount: 1315.00, member: 'Peter' },
        { desc: 'Council Tax', amount: 179.00, member: 'Peter' },
        { desc: 'Sky Broadband', amount: 34.00, member: 'Peter' },
        { desc: 'OVO', amount: 190.00, member: 'Peter' }
    ];

    // 【最強保險】數字清理函數
    function cleanNumber(val) {
        if (val === null || val === undefined || val === '') return 0;
        if (typeof val === 'number') return val;
        // 剷走所有非數字同非點號嘅嘢 (例如 £, 字串, 逗號)
        const s = String(val).replace(/[^0-9.]/g, '');
        const num = parseFloat(s);
        return isNaN(num) ? 0 : num;
    }

    window.onload = () => {
        document.getElementById('iptDate').value = new Date().toISOString().slice(0, 10);
        renderMembers();
        fetchData();
    };

    function renderMembers() {
        const html = state.members.map(m => `
            <div class="m-btn ${m === activeMember ? 'active' : ''}" onclick="setMember('${m}')">${m}</div>
        `).join('');
        document.getElementById('memberBtns').innerHTML = html;
    }

    function setMember(m) { activeMember = m; renderMembers(); }

    async function fetchData() {
        showLoading(true);
        try {
            const r = await fetch(API + '?nocache=' + Date.now());
            const j = await r.json();
            console.log("Raw data from Google:", j); // Debug 用，喺電腦掣 F12 睇到
            if (j.ok) {
                state.expenses = j.data.expenses || [];
                state.cards = j.data.cards || [];
                renderSummary();
                if (document.getElementById('page-cards').classList.contains('active')) renderCards();
            }
        } catch(e) { 
            console.error(e);
            alert('連線失敗'); 
        }
        showLoading(false);
    }

    function renderSummary() {
        document.querySelectorAll('.curMonthText').forEach(el => el.innerText = activeMonth);
        
        // 篩選本月數據
        const monthly = state.expenses.filter(e => {
            const eMonth = e.month ? String(e.month).slice(0, 7) : "";
            return eMonth === activeMonth;
        });

        const total = monthly.reduce((s, e) => s + cleanNumber(e.amount), 0);
        const each = total / state.members.length;
        
        document.getElementById('totalDisplay').innerText = `£${total.toFixed(2)}`;
        
        let settleHtml = `<p style="margin-bottom:10px; font-weight:bold; color:var(--p-color);">Per Person / 每人應付: £${each.toFixed(2)}</p>`;
        let memberBalances = [];

        state.members.forEach(m => {
            const paid = monthly.filter(e => e.member === m).reduce((s, e) => s + cleanNumber(e.amount), 0);
            const bal = paid - each;
            memberBalances.push({ name: m, balance: bal });

            settleHtml += `
                <div class="summary-item">
                    <span>${m} <span class="lang-sub">Paid £${paid.toFixed(2)}</span></span>
                    <span class="status-tag ${bal >= -0.01 ? 'tag-plus' : 'tag-minus'}">
                        ${bal >= -0.01 ? 'Recv / 收' : 'Pay / 補'} £${Math.abs(bal).toFixed(2)}
                    </span>
                </div>`;
        });

        // 轉帳建議邏輯
        let clearingHtml = '<div style="margin-top:20px; border-top:2px dashed #e5e5ea; padding-top:15px;"><h3>Suggested Payments</h3>';
        let debtors = memberBalances.filter(m => m.balance < -0.01).sort((a, b) => a.balance - b.balance);
        let creditors = memberBalances.filter(m => m.balance > 0.01).sort((a, b) => b.balance - a.balance);

        if (debtors.length === 0) {
            clearingHtml += '<p style="color:#8e8e93;">All settled!</p>';
        } else {
            let tempCreditors = creditors.map(c => ({...c}));
            debtors.forEach(d => {
                let debt = Math.abs(d.balance);
                tempCreditors.forEach(c => {
                    if (debt > 0.01 && c.balance > 0.01) {
                        let amount = Math.min(debt, c.balance);
                        clearingHtml += `<p style="font-size:14px; margin:5px 0;">💸 <strong>${d.name}</strong> ➔ <strong>${c.name}</strong>: <span style="color:#e74c3c;font-weight:bold;">£${amount.toFixed(2)}</span></p>`;
                        debt -= amount;
                        c.balance -= amount;
                    }
                });
            });
        }
        clearingHtml += '</div>';
        document.getElementById('settleList').innerHTML = settleHtml + clearingHtml;

        // 最近 5 條紀錄
        const recent5 = [...state.expenses].reverse().slice(0, 5);
        let recentHtml = recent5.map(e => `
            <div class="recent-item">
                <span style="flex: 2;">${e.desc || 'No Desc'}</span>
                <span style="flex: 1; text-align: right; font-weight: bold;">£${cleanNumber(e.amount).toFixed(2)}</span>
                <span style="flex: 1; text-align: right; color: #8e8e93;">${e.member || 'Unknown'}</span>
            </div>
        `).join('');
        document.getElementById('recentList').innerHTML = recentHtml || '<p style="text-align:center;color:#ccc;">No records</p>';
    }

    function changeMonth(step) {
        let [y, m] = activeMonth.split('-').map(Number);
        m += step;
        if(m > 12) { y++; m=1; } else if(m < 1) { y--; m=12; }
        activeMonth = `${y}-${String(m).padStart(2, '0')}`;
        renderSummary();
    }

    async function submitData() {
    const desc = document.getElementById('iptDesc').value;
    const amt = parseFloat(document.getElementById('iptAmt').value);
    const date = document.getElementById('iptDate').value;

    if(!desc || isNaN(amt)) return alert('Please fill in');

    // 1. 準備數據物件
    const item = {
        member: activeMember, 
        desc: desc, 
        amount: amt,
        month: date.slice(0, 7), 
        date: date
    };

    // 2. 極速反應：即刻清空輸入框，唔好等 API
    document.getElementById('iptDesc').value = '';
    document.getElementById('iptAmt').value = '';
    
    // 3. 直接更新本地嘅「最近紀錄」，令你覺得「入咗喇」
    state.expenses.push(item); 
    renderSummary(); 

    // 4. 背後傳送 (唔用 await，唔顯示「處理中」，靜靜雞傳)
    fetch(API, {
        method: 'POST',
        mode: 'no-cors', // 加入呢行可以避開部分連線延遲感
        body: JSON.stringify({ action: 'add_batch', items: [item] })
    }).then(() => {
        console.log("Background sync done.");
        // 5. 隔 2 秒後靜靜雞喺背後 refresh 一次數據，確保同步
        setTimeout(fetchData, 2000);
    }).catch(e => console.error("Sync failed", e));
} // <--- 確保呢個關閉括號喺度
    
    async function addFixedExpenses() {
        if(!confirm('Confirm adding fixed expenses?')) return;
        const date = document.getElementById('iptDate').value;
        const month = date.slice(0, 7);
        
        showLoading(true);
        // 呢度改用 no-cors 模式發送，唔去等 Google 回傳結果，直接當成功
        fetch(API, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'add_batch', items: FIXED_ITEMS.map(f => ({...f, date: date, month: month})) })
        }).then(() => {
            // 停 2 秒等 Google 嗰邊處理完，再 refresh 畫面
            setTimeout(async () => {
                await fetchData();
                showLoading(false);
                alert('Fixed expenses added!');
            }, 2000);
        }).catch(e => {
            console.error(e);
            showLoading(false);
            alert('Save failed');
        });
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + pageId).classList.add('active');
        if (pageId === 'cards') renderCards();
        else renderSummary();
    }

    function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

   async function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // 1. 根據 activeMonth 篩選數據
    const monthly = state.expenses.filter(e => {
        const eMonth = e.month ? String(e.month).slice(0, 7) : "";
        return eMonth === activeMonth;
    });

    if (monthly.length === 0) return alert('呢個月冇數據！');

    // 2. 計算總數同每人應付 (除 4)
    const total = monthly.reduce((s, e) => s + cleanNumber(e.amount), 0);
    const perPerson = (total / 4).toFixed(2);

    // --- 頂部排版 ---
    // A-F 跨行居中：顯示月份
    doc.setFontSize(18);
    doc.setFont("helvetica", "bold");
    doc.text(activeMonth, 105, 15, { align: "center" });

    // F 欄位置 (靠右)：顯示 Total 同 Per Person
    doc.setFontSize(11);
    doc.text(`Total : £${total.toFixed(2)}`, 196, 25, { align: "right" });
    doc.text(`Per Person: £${perPerson}`, 196, 31, { align: "right" });

    // --- 表格數據 ---
    const tableData = monthly.map(e => [
        e.member || '',
        e.desc || '',
        `£${cleanNumber(e.amount).toFixed(2)}`,
        e.date || ''
    ]);

    // --- 畫表 (A-D 欄) ---
    doc.autoTable({
        startY: 38,
        head: [['Member', 'Description', 'Amount', 'Date']],
        body: tableData,
        theme: 'plain', 
        headStyles: { textColor: [0, 0, 0], fontStyle: 'bold', lineWidth: 0.1, lineColor: [200, 200, 200] },
        styles: { fontSize: 10, cellPadding: 4, lineWidth: 0.1, lineColor: [230, 230, 230] },
        columnStyles: {
            2: { halign: 'right' } // Amount 靠右對齊
        },
        margin: { left: 14, right: 14 }
    });

    doc.save(`Expense_${activeMonth}.pdf`);
}
    function openModal() { document.getElementById('cardModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('cardModal').style.display = 'none'; }

async function saveNewCard() {
    const name = document.getElementById('newCardName').value;
    const file = document.getElementById('newCardImg').files[0];
    if (!name || !file) return alert('Please enter name and select photo!');
    
    showLoading(true);
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            // --- 壓縮邏輯 ---
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 600; // 限制闊度 600px，已經夠睇清 Barcode
            let width = img.width;
            let height = img.height;

            if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            // 轉返做細 Size 嘅 Base64 (品質 0.7)
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
            
            // 傳送去 Google
            fetch(API, {
                method: 'POST',
                body: JSON.stringify({ action: 'add_card', name: name, img: compressedBase64 })
            }).then(r => r.json()).then(result => {
                if (result.ok) {
                    closeModal();
                    fetchData(); // 靜靜雞更新本地資料
                }
                showLoading(false);
            }).catch(err => {
                alert('Save failed!');
                showLoading(false);
            });
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

    function renderCards() {
        const searchTerm = document.getElementById('cardSearch').value.toLowerCase();
        const list = document.getElementById('memberCardList');
        const filtered = (state.cards || [])
            .filter(c => c.name.toLowerCase().includes(searchTerm))
            .sort((a, b) => a.name.localeCompare(b.name));
        if (filtered.length === 0) {
            list.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No cards found</div>';
            return;
        }
        list.innerHTML = filtered.map(c => `
            <div class="member-card-item">
                <button class="delete-card" onclick="deleteCard('${c.id}')">×</button>
                <img src="${c.img}" class="member-card-img" onclick="viewImage('${c.img}')">
                <div class="member-card-info">${c.name}</div>
            </div>
        `).join('');
    }

    async function deleteCard(id) {
        if(!confirm('Delete this card?')) return;
        showLoading(true);
        try {
            const resp = await fetch(API, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete_card', id: id })
            });
            const result = await resp.json();
            if (result.ok) await fetchData();
        } catch(e) { alert('Delete failed!'); }
        showLoading(false);
    }

    // 放大張相
function viewImage(src) {
    const overlay = document.getElementById('fullImageOverlay');
    const fullImg = document.getElementById('fullImageTag');
    fullImg.src = src;
    overlay.style.display = 'flex';
}

// 閂咗佢
function closeImage() {
    document.getElementById('fullImageOverlay').style.display = 'none';
}
</script>
<div id="fullImageOverlay" class="img-overlay" onclick="closeImage()">
    <img id="fullImageTag" src="">
    <div class="close-tip">Click anywhere to close / 撳任何位置關閉</div>
</div>
</body>
</html>
